<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Book Library</title>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>My Book Library</h1>
            <button id="add-book-button">Add Book</button>
                <form id="add-book-form" style="display: none;">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" required><br>
                    <label for="author">Author:</label>
                    <input type="text" id="author" name="author" required><br>
                    <label for="pages">Pages:</label>
                    <input type="number" id="pages" name="pages" required><br>
                    <label for="readStatus">Read Status:</label>
                    <select id="readStatus" name="readStatus">
                        <option value="Read">Read</option>
                        <option value="Not Read">Not Read</option>
                    </select><br>
                    <input type="submit" id="submit-book" value="Add Book">
                </form>
                <div id="library">
        </div>
        <script src="./project2.js"></script>
    </body>    
</html>
